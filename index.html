<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Happy Hours | Find Happy Hours in San Diego</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 3rem;
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .tagline {
      color: #94a3b8;
      font-size: 1.2rem;
    }

    .filters {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 30px 0;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .filter-group label {
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    select {
      padding: 12px 20px;
      border-radius: 10px;
      border: 2px solid #334155;
      background: #1e293b;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      min-width: 180px;
    }

    select:focus {
      outline: none;
      border-color: #f59e0b;
    }

    .status-bar {
      text-align: center;
      padding: 15px;
      background: rgba(245, 158, 11, 0.1);
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .status-bar .count {
      font-size: 1.5rem;
      font-weight: bold;
      color: #f59e0b;
    }

    .happening-now {
      display: inline-block;
      background: #22c55e;
      color: #000;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-left: 10px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
    }

    .card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border-radius: 16px;
      padding: 25px;
      border: 1px solid #334155;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .card.active-now {
      border-color: #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 15px;
    }

    .card h2 {
      font-size: 1.4rem;
      color: #fff;
    }

    .card .neighborhood {
      background: #334155;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .card .vibe {
      color: #f59e0b;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .card .time {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      margin-bottom: 15px;
    }

    .card .time .clock {
      font-size: 1.2rem;
    }

    .card .days {
      display: flex;
      gap: 5px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .card .day {
      background: #0f172a;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      color: #64748b;
    }

    .card .day.today {
      background: #f59e0b;
      color: #000;
      font-weight: bold;
    }

    .card .deals {
      margin-top: 15px;
    }

    .card .deals h3 {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card .deal {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      padding: 6px 12px;
      border-radius: 6px;
      display: inline-block;
      margin: 3px;
      font-size: 0.9rem;
    }

    .card .address {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #334155;
      color: #64748b;
      font-size: 0.9rem;
    }

    .card .address a {
      color: #60a5fa;
      text-decoration: none;
    }

    .card .address a:hover {
      text-decoration: underline;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #64748b;
    }

    .empty-state h2 {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
      font-size: 0.9rem;
    }

    footer a {
      color: #f59e0b;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      .grid { grid-template-columns: 1fr; }
      .filters { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>SD Happy Hours</h1>
      <p class="tagline">Find the best happy hour deals in San Diego</p>
    </header>

    <div class="filters">
      <div class="filter-group">
        <label>Day</label>
        <select id="day-filter">
          <option value="">All Days</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
          <option value="Sunday">Sunday</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Neighborhood</label>
        <select id="neighborhood-filter">
          <option value="">All Neighborhoods</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Status</label>
        <select id="status-filter">
          <option value="">All</option>
          <option value="now">Happening Now</option>
        </select>
      </div>
    </div>

    <div class="status-bar">
      <span class="count" id="result-count">0</span> happy hours found
      <span class="happening-now" id="live-count"></span>
    </div>

    <div class="grid" id="grid"></div>

    <div class="empty-state" id="empty-state" style="display: none;">
      <h2>No happy hours found</h2>
      <p>Try adjusting your filters</p>
    </div>

    <footer>
      <p>Built by Shane & John | <a href="mailto:hello@sdhappyhours.com">Submit a happy hour</a></p>
    </footer>
  </div>

  <script>
    let happyHours = [];
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const today = days[new Date().getDay()];

    // Set today as default filter
    document.getElementById('day-filter').value = today;

    async function loadData() {
      const res = await fetch('/data/happy-hours.json');
      happyHours = await res.json();

      // Populate neighborhood filter
      const neighborhoods = [...new Set(happyHours.map(h => h.neighborhood))].sort();
      const neighborhoodSelect = document.getElementById('neighborhood-filter');
      neighborhoods.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n;
        opt.textContent = n;
        neighborhoodSelect.appendChild(opt);
      });

      render();
    }

    function isHappeningNow(hh) {
      if (!hh.days.includes(today)) return false;

      const now = new Date();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();

      const [startH, startM] = hh.startTime.split(':').map(Number);
      const [endH, endM] = hh.endTime.split(':').map(Number);

      const startMinutes = startH * 60 + startM;
      const endMinutes = endH * 60 + endM;

      return currentMinutes >= startMinutes && currentMinutes <= endMinutes;
    }

    function formatTime(time) {
      const [h, m] = time.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const hour = h % 12 || 12;
      return `${hour}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    function render() {
      const dayFilter = document.getElementById('day-filter').value;
      const neighborhoodFilter = document.getElementById('neighborhood-filter').value;
      const statusFilter = document.getElementById('status-filter').value;

      let filtered = happyHours;

      if (dayFilter) {
        filtered = filtered.filter(h => h.days.includes(dayFilter));
      }

      if (neighborhoodFilter) {
        filtered = filtered.filter(h => h.neighborhood === neighborhoodFilter);
      }

      if (statusFilter === 'now') {
        filtered = filtered.filter(h => isHappeningNow(h));
      }

      // Sort: happening now first, then by start time
      filtered.sort((a, b) => {
        const aLive = isHappeningNow(a);
        const bLive = isHappeningNow(b);
        if (aLive && !bLive) return -1;
        if (!aLive && bLive) return 1;
        return a.startTime.localeCompare(b.startTime);
      });

      const grid = document.getElementById('grid');
      const emptyState = document.getElementById('empty-state');
      const resultCount = document.getElementById('result-count');
      const liveCount = document.getElementById('live-count');

      resultCount.textContent = filtered.length;

      const liveNow = filtered.filter(h => isHappeningNow(h)).length;
      liveCount.textContent = liveNow > 0 ? `${liveNow} happening now` : '';
      liveCount.style.display = liveNow > 0 ? 'inline-block' : 'none';

      if (filtered.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';

      grid.innerHTML = filtered.map(h => {
        const isLive = isHappeningNow(h);
        const dayDisplay = dayFilter || today;

        return `
          <div class="card ${isLive ? 'active-now' : ''}">
            <div class="card-header">
              <h2>${h.name}</h2>
              <span class="neighborhood">${h.neighborhood}</span>
            </div>
            <div class="vibe">${h.vibe}</div>
            <div class="time">
              <span class="clock">${isLive ? '🟢' : '🕐'}</span>
              <span>${formatTime(h.startTime)} - ${formatTime(h.endTime)}</span>
              ${isLive ? '<strong style="color: #22c55e;">LIVE NOW</strong>' : ''}
            </div>
            <div class="days">
              ${h.days.map(d => `<span class="day ${d === today ? 'today' : ''}">${d.slice(0,3)}</span>`).join('')}
            </div>
            <div class="deals">
              <h3>Deals</h3>
              ${h.deals.map(d => `<span class="deal">${d}</span>`).join('')}
            </div>
            <div class="address">
              <a href="https://maps.google.com/?q=${encodeURIComponent(h.address + ', San Diego, CA')}" target="_blank">
                ${h.address}
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    document.getElementById('day-filter').addEventListener('change', render);
    document.getElementById('neighborhood-filter').addEventListener('change', render);
    document.getElementById('status-filter').addEventListener('change', render);

    loadData();
  </script>
</body>
</html>
