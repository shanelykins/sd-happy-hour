<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | SD Happy Hours</title>
  <style>
    :root {
      --ink: #0F172A;
      --muted: #64748B;
      --line: #E2E8F0;
      --paper: #FFFFFF;
      --wash: #F8FAFC;
      --accent: #FF6B35;
      --bad: #B91C1C;
    }

    * { box-sizing: border-box; }

    body {
      align-items: center;
      background: linear-gradient(135deg, #1A0A2E, #8B4B6B 60%, #F4C05C);
      color: var(--ink);
      display: flex;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 24px;
    }

    main {
      background: var(--paper);
      border-radius: 14px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.28);
      max-width: 420px;
      padding: 26px;
      width: 100%;
    }

    a {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
    }

    h1 {
      font-size: 1.8rem;
      margin: 20px 0 8px;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
      margin: 0 0 20px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      color: var(--muted);
      display: grid;
      font-size: 0.78rem;
      font-weight: 800;
      gap: 6px;
      text-transform: uppercase;
    }

    input {
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--ink);
      font: inherit;
      padding: 12px;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.12);
      outline: none;
    }

    button {
      background: var(--ink);
      border: 0;
      border-radius: 100px;
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      padding: 12px 18px;
    }

    .status {
      color: var(--muted);
      font-weight: 700;
      min-height: 1.4em;
    }

    .status.error {
      color: var(--bad);
    }
  </style>
</head>
<body>
  <main>
    <a href="/">Back to site</a>
    <h1>Admin Login</h1>
    <p>Log in to review, edit, approve, or deny restaurant submissions.</p>

    <form id="login-form">
      <label>
        Username
        <input name="username" autocomplete="username" required>
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Log in</button>
      <div class="status" id="status" aria-live="polite"></div>
    </form>
  </main>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const status = document.getElementById('status');
      const button = form.querySelector('button');
      const formData = new FormData(form);

      status.classList.remove('error');
      status.textContent = 'Logging in...';
      button.disabled = true;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: formData.get('username'),
            password: formData.get('password')
          })
        });
        const json = await res.json();
        if (!res.ok) throw new Error((json.errors || ['Login failed.']).join(' '));
        window.location.href = '/admin.html';
      } catch (err) {
        status.classList.add('error');
        status.textContent = err.message;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
